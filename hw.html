<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
    <h1 id="result"></h1>
    <script>
        async function div(x, y) {
            var res = await x/y;
            fun1(res);
        }
        function fun1(r) {
            document.getElementById("result").innerHTML= "Division = " + r;
        }
        div(100000,8)
    </script>
</body>
